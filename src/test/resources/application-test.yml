spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  core:
    datasource:
      jdbc-url: jdbc:h2:mem:coretestdb
      username: sa
      password:
      driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    open-in-view: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reporting-service-test
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.udea.bancodigital
        spring.json.use.type.headers: false
  cloud:
    discovery:
      enabled: false
    vault:
      enabled: false

jwt:
  secret: dGVzdF9zZWNyZXRfcmVwbGFjZV9pbl9wcm9kX3dpdGhfMjU2Yml0cw==

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.udea.bancodigital: DEBUG
    org.hibernate.SQL: DEBUG
