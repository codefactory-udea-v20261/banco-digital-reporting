spring:
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
eureka:
  client:
    enabled: false
  flyway:
    enabled: false
core:
  datasource:
    jdbc-url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  security:
    jwt:
      secret: dGVzdF9zZWNyZXRfcmVwbGFjZV9pbl9wcm9kX3dpdGhfMjU2Yml0cw==

management:
  health:
    vault:
      enabled: false

logging:
  level:
    com.udea.bancodigital: DEBUG