spring:
  application:
    name: reporting-service
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_digital_reporting}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC        # Consistencia de zona horaria — el banco opera en UTC
          fetch_size: 500       # Streaming de resultados grandes para evitar OOM

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Eureka Service Discovery
  eureka:
    client:
      serviceUrl:
        defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
      registerWithEureka: true
      fetchRegistry: true
    instance:
      instanceId: ${spring.application.name}:${server.port}
      preferIpAddress: true
      leaseRenewalIntervalInSeconds: 30
      leaseExpirationDurationInSeconds: 90

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true
      properties:
        spring.json.trusted.packages: com.udea.bancodigital

  # Distributed Tracing
  zipkin:
    base-url: ${ZIPKIN_URL:http://localhost:9411/}
    enabled: true
  sleuth:
    sampler:
      probability: 1.0

  # Resilience4j Circuit Breaker Configuration
  resilience4j:
    circuitbreaker:
      instances:
        reporting-database:
          registerHealthIndicator: true
          slidingWindowSize: 10
          slidingWindowType: COUNT_BASED
          failureRateThreshold: 50.0
          slowCallRateThreshold: 100.0
          slowCallDurationThreshold: 2s
          permittedNumberOfCallsInHalfOpenState: 3
          automaticTransitionFromOpenToHalfOpenEnabled: true
          waitDurationInOpenState: 5s
          recordExceptions:
            - java.sql.SQLException
            - org.postgresql.util.PSQLException
            - org.springframework.dao.DataAccessException
    retry:
      instances:
        reporting-database:
          registerHealthIndicator: false
          max-attempts: 3
          wait-duration: 1000
          interval-function: exponential
          exponential-backoff-multiplier: 2.0
          retry-exceptions:
            - java.sql.SQLException
            - org.postgresql.util.PSQLException
            - org.springframework.dao.DataAccessException

server:
  port: ${PORT:${APP_PORT:8083}}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev_secret_replace_in_prod_must_be_256bits}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:3}
      lockout-minutes: ${LOGIN_LOCKOUT_MINUTES:15}
    default-client-password: ${DEFAULT_CLIENT_PASSWORD:Temp1234!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  api:
    version: v1

core:
  datasource:
    jdbc-url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/banco_digital_core
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

migration:
  enabled: ${MIGRATION_ENABLED:true}
