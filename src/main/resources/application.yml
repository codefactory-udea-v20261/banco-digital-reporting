spring:
  application:
    name: reporting-service
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_digital_reporting}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC        # Consistencia de zona horaria — el banco opera en UTC
          fetch_size: 500       # Streaming de resultados grandes para evitar OOM

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Kafka Configuration
spring.kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
  consumer:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    group-id: ${spring.application.name}
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    auto-offset-reset: earliest
    enable-auto-commit: true
    properties:
      spring.json.trusted.packages: com.udea.bancodigital
    # Consumer timeout configuration
    session-timeout-ms: ${KAFKA_SESSION_TIMEOUT_MS:30000}
    heartbeat-interval-ms: ${KAFKA_HEARTBEAT_INTERVAL_MS:10000}
    max-poll-interval-ms: ${KAFKA_MAX_POLL_INTERVAL_MS:300000}

# Distributed Tracing
spring.zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411/}
  enabled: true
spring.sleuth:
  sampler:
    probability: 1.0

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      reporting-database:
        registerHealthIndicator: true
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50.0
        slowCallRateThreshold: 100.0
        slowCallDurationThreshold: 2s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        recordExceptions:
          - java.sql.SQLException
          - org.postgresql.util.PSQLException
          - org.springframework.dao.DataAccessException
  retry:
    instances:
      reporting-database:
        max-attempts: 3
        wait-duration: 1000
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - java.sql.SQLException
          - org.postgresql.util.PSQLException
          - org.springframework.dao.DataAccessException

server:
  port: ${PORT:${APP_PORT:8083}}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  api:
    version: v1

migration:
  enabled: ${MIGRATION_ENABLED:true}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
