spring:
  application:
    name: banco-digital-reporting
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_digital_reporting}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:${APP_PORT:8083}}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev_secret_replace_in_prod_must_be_256bits}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:3}
      lockout-minutes: ${LOGIN_LOCKOUT_MINUTES:15}
    default-client-password: ${DEFAULT_CLIENT_PASSWORD:Temp1234!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  api:
    version: v1
