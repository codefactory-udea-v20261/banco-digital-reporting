spring:
  cloud:
    vault:
      enabled: false
    config:
      enabled: false
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

# Disable Eureka for Cloud Run
eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false

# Disable Kafka consumers for Cloud Run
spring.kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  listener:
    auto-startup: false

spring.cloud.stream:
  kafka:
    binder:
      auto-startup: false

management:
  health:
    kafka:
      enabled: false
    diskspace:
      enabled: false

logging:
  level:
    root: WARN
    com.udea.bancodigital: INFO

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
