name: CI Pipeline — Reporting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x ./mvnw

      - name: Build & Test
        run: ./mvnw -B verify -Djacoco.haltOnFailure=false
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'banco-digital-reporting'
          path: '.'
          format: 'HTML'
          args: '--failOnCVSS 7 --enableRetired'

            # 1. INTEGRACIÓN CON SNYK
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --org=carlosvaza --severity-threshold=high

      - name: Ensure Maven Wrapper is executable
        run: chmod +x ./mvnw

            # 2. OWASP CON NVD API KEY
      - name: OWASP Dependency Check (Maven)
        run: |
          ./mvnw -B org.owasp:dependency-check-maven:check \
           -DfailBuildOnCVSS=7 \
           -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
           -Dformat=HTML \
           -DoutputDirectory=reports || true

      - name: Upload Dependency Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: reports/

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x ./mvnw

      - name: Run SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=codefactory-udea-v20261 -Dsonar.projectKey=codefactory-udea-v20261_banco-digital-reporting

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t banco-digital-reporting:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'banco-digital-reporting:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
