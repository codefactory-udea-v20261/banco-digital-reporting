name: Deploy reporting to GKE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read       # checkout
  id-token: write      # Workload Identity OIDC token

env:
  PROJECT_ID:         project-2183efe1-b87d-4c12-966
  REGION:             us-central1
  GAR_REPO:           banco-digital-repo
  IMAGE_PACKAGE:      banco-digital-reporting
  GKE_CLUSTER:        banco-digital-cluster
  GKE_LOCATION:       us-central1
  NAMESPACE:          banco-digital
  K8S_DEPLOYMENT:     reporting
  ORCHESTRATION_REPO: codefactory-udea-v20261/banco-digital-orchestration
  ORCHESTRATION_REF:  main

concurrency:
  group: deploy-reporting
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, rollout
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout banco-digital-reporting
        uses: actions/checkout@v4

      - name: Checkout orchestration (k8s/deployments/reporting.yaml)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORCHESTRATION_REPO }}
          ref:        ${{ env.ORCHESTRATION_REF }}
          path:       orchestration

      - name: Authenticate to Google Cloud (Workload Identity, no SA keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK + gke-gcloud-auth-plugin
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image (tag = $GITHUB_SHA, never :latest)
        env:
          IMAGE_BASE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_PACKAGE }}
        run: |
          docker build -t "$IMAGE_BASE:$GITHUB_SHA" .
          docker push "$IMAGE_BASE:$GITHUB_SHA"
          echo "Pushed: $IMAGE_BASE:$GITHUB_SHA"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location:     ${{ env.GKE_LOCATION }}

      - name: Bump reporting Deployment image to $GITHUB_SHA and apply
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_PACKAGE }}:${{ github.sha }}
        run: |
          set -euo pipefail
          MANIFEST=orchestration/k8s/deployments/reporting.yaml
          sed -i "s|image: .*${IMAGE_PACKAGE}:.*|image: $IMAGE|" "$MANIFEST"
          grep -q "$IMAGE" "$MANIFEST" || {
            echo "ERROR: sed pattern did not match in $MANIFEST."
            exit 1
          }
          # Per-service deploy: only the reporting Deployment is reapplied.
          # Cluster bootstrap (Namespace, Secrets, ConfigMaps, RBAC,
          # StatefulSets) is k8s/apply.sh's job in the orchestration repo.
          kubectl apply -f "$MANIFEST"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=300s
